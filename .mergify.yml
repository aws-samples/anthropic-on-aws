
queue_rules:
  - name: default
    update_method: merge
    queue_conditions:
      - "#approved-reviews-by>=1"
      - -label~=(do-not-merge)
      - status-success=build
    merge_method: squash
    commit_message_format:
      title: pr-title
      body: pr-body
pull_request_rules:
  - name: Automatic merge on approval and successful build
    actions:
      queue:
        name: default
    conditions:
      - "#approved-reviews-by>=1"
      - -label~=(do-not-merge)
      - status-success=build
merge_queue:
  max_parallel_checks: 1
