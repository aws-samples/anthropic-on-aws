# Claude apps gateway config for ap-southeast-2 + Microsoft Entra ID + Bedrock.
# Secrets are injected via ${ENV_VAR} expansion from Secrets Manager at task start,
# so this file is safe to keep in version control.

listen:
  host: 0.0.0.0
  port: 8080
  # Public hostname (browser-trusted ACM cert) that resolves to the internal ALB's private
  # IP via a split-horizon private zone over the VPN. Used to build the IdP redirect_uri and
  # the OAuth discovery document.
  public_url: ${GATEWAY_PUBLIC_URL}
  # Trust X-Forwarded-For from the ALB (whole VPC CIDR) so per-IP limits + audit
  # record the real client IP instead of the proxy's.
  trusted_proxies: [10.60.0.0/16]

oidc:
  issuer: ${OIDC_ISSUER}
  client_id: ${OIDC_CLIENT_ID}
  client_secret: ${OIDC_CLIENT_SECRET}
  # No allowed_email_domains gate: the single-tenant OIDC issuer + audience validation is the
  # real boundary, and this tenant legitimately mixes gmail.com guest accounts and
  # onmicrosoft.com users, so a domain allowlist wrongly rejects valid tenant members.
  # Entra's id_token can omit email/groups depending on the app config; pull from
  # userinfo as a fallback. Harmless when the token already carries them.
  userinfo_fallback: true
  # Entra emits group Object IDs (GUIDs), not names. Use GUIDs in
  # managed.policies.match.groups, or switch to App Roles and set:
  # groups_claim: roles

session:
  jwt_secret: ${GATEWAY_JWT_SECRET}
  ttl_hours: 1

store:
  postgres_url: ${GATEWAY_POSTGRES_URL} # includes ?sslmode=require

upstreams:
  - provider: bedrock
    region: ap-southeast-2
    auth: {} # Fargate task role via the AWS default credential chain

# REQUIRED for ap-southeast-2: the built-in catalog maps to us.anthropic.* profiles,
# which do NOT exist in this region. Disable it and map each model to its au.* profile.
auto_include_builtin_models: false
models:
  - id: claude-opus-4-8
    label: Claude Opus 4.8
    upstream_model:
      bedrock: au.anthropic.claude-opus-4-8
  - id: claude-fable-5
    label: Claude Fable 5
    upstream_model:
      # Fable 5 has NO au.* (Australia-local) inference profile — it is global-only.
      # Also requires the account Bedrock data-retention mode = provider_data_share.
      bedrock: global.anthropic.claude-fable-5
  - id: claude-sonnet-4-6
    label: Claude Sonnet 4.6
    upstream_model:
      bedrock: au.anthropic.claude-sonnet-4-6
  - id: claude-haiku-4-5-20251001
    label: Claude Haiku 4.5
    upstream_model:
      bedrock: au.anthropic.claude-haiku-4-5-20251001-v1:0

# OTLP telemetry. Setting forward_to (with listen.public_url) makes the gateway push
# CLAUDE_CODE_ENABLE_TELEMETRY=1 + OTEL_*_EXPORTER=otlp + OTEL_EXPORTER_OTLP_ENDPOINT=
# <public_url> to every CLI client via /managed/settings — clients then send OTLP to
# https://gw.../v1/{metrics,logs}. The ALB routes those paths STRAIGHT to the ADOT
# collector sidecar (same task, port 4318), so this loopback relay target is a fallback
# for anything that reaches the gateway process itself. The CLI stamps user.id/user.email/
# user.groups from its gateway JWT, so per-user attribution needs no client config.
# NOTE: logs (unlike metrics) can carry bash commands, tool inputs, and file paths — they
# stay inside this account's CloudWatch.
telemetry:
  forward_to:
    - url: http://localhost:4318
      metrics: true
      logs: true

# Per-user usage tracking + spend quotas. Enabling `admin:` turns on:
#   1. A usage METER: after every /v1/messages response the gateway reads token counts off
#      the stream, prices them at USD list price, and increments per-user counters in
#      Postgres (`spend` table) for daily/weekly/monthly buckets.
#   2. An ADMIN API at /v1/organizations/spend_limits (mirrors Anthropic's Admin API):
#      set caps per user (OIDC sub) / IdP group / org; read per-user spend via /effective.
#   3. ENFORCEMENT: over-cap users get 429 billing_error on /v1/messages until the period
#      resets or the cap is raised. Caps are set via the API, not in this file.
admin:
  write_keys:
    - { id: ops, key: "${GATEWAY_ADMIN_WRITE_KEY}" }
  read_keys:
    - { id: reporting, key: "${GATEWAY_ADMIN_READ_KEY}" }
  blocked_message: ${GATEWAY_BLOCKED_MESSAGE}

enforcement:
  # Fail OPEN on a Postgres outage: a store blip must not become an inference outage.
  # (Set true only if guaranteed-no-unmetered-spend matters more than availability.)
  fail_closed_on_error: false

managed:
  policies:
    # Catch-all default: every authenticated user in the org gets all four models.
    # Add group-scoped policies ABOVE this entry (matched first) to differentiate.
    - match: {}
      cli:
        availableModels:
          - claude-opus-4-8
          - claude-fable-5
          - claude-sonnet-4-6
          - claude-haiku-4-5-20251001
        # Make the "Default" model resolve to one inside the allowlist instead of
        # Claude Code's built-in default (which would be rejected at request time).
        enforceAvailableModels: true
        permissions:
          # Disable Claude's BUILT-IN server-side web search org-wide. Amazon Bedrock does
          # not support the web_search_20250305 tool type, so any request carrying it is
          # rejected upstream with a 400. Web search is instead provided by the managed
          # WebSearch MCP server (delivered via the bootstrap response), which Bedrock
          # serves fine as an ordinary tool call.
          deny:
            - WebSearch
